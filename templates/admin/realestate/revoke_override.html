{% extends "admin/base_site.html" %}
{% block content %}
<form method="post">{% csrf_token %}
  {{ form.as_p }}
  <input type="hidden" name="action" value="revoke_override_action">
  {% for override in overrides %}<input type="hidden" name="_selected_action" value="{{ override.pk }}">{% endfor %}
  <button type="submit" name="confirm_override_revocation" value="1">Revoke override</button>
</form>
{% endblock %}
